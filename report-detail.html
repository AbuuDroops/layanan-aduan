<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Laporan - Layanan Aduan</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #0f1419;
      color: #ffffff;
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .page-nav {
      padding: 20px 30px;
      background: #171c26;
      border-bottom: 1px solid #333;
    }
    .page-nav a {
      color: #2196F3;
      text-decoration: none;
      font-weight: 600;
    }
    .page-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px 40px;
    }
    .report-detail-card {
      background: #1a1f2e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    .report-title {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 8px 0;
    }
    .report-id {
      font-size: 14px;
      color: #666;
      margin: 0;
    }
    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-pending { background: rgba(255, 152, 0, 0.2); color: #FFB74D; }
    .status-user_confirmed { background: rgba(33, 150, 243, 0.2); color: #64B5F6; }
    .status-admin_confirmed { background: rgba(156, 39, 176, 0.2); color: #BA68C8; }
    .status-completed { background: rgba(76, 175, 80, 0.2); color: #81C784; }
    .report-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .meta-item {
      background: #252c3d;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #333;
    }
    .meta-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .meta-value {
      font-size: 14px;
      color: #ffffff;
      margin: 0;
    }
    .report-description {
      background: #252c3d;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #333;
      margin-bottom: 30px;
    }
    .description-label {
      font-size: 14px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .description-text {
      color: #ffffff;
      line-height: 1.6;
      margin: 0;
      white-space: pre-wrap;
    }
    .confirmation-section {
      background: #252c3d;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #333;
      margin-bottom: 30px;
    }
    .confirmation-title {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      margin: 0 0 16px 0;
    }
    .confirmation-status {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .confirmation-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .confirmation-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
    }
    .confirmation-icon.pending { background: #666; color: #fff; }
    .confirmation-icon.confirmed { background: #4CAF50; color: #fff; }
    .confirmation-icon.not-required { background: #2196F3; color: #fff; }
    .confirmation-text {
      font-size: 12px;
      color: #b0b0b0;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
    }
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #2196F3 0%, #1565C0 100%);
      color: #ffffff;
    }
    .btn-success {
      background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
      color: #ffffff;
    }
    .btn-secondary {
      background: #252c3d;
      color: #b0b0b0;
    }
    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      display: none;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      margin-bottom: 20px;
    }
    .message.success {
      background: rgba(76, 175, 80, 0.12);
      color: #c8e6c9;
    }
    .message.error {
      background: rgba(244, 67, 54, 0.12);
      color: #ffcdd2;
    }
    @media (max-width: 640px) {
      .report-header {
        flex-direction: column;
        gap: 16px;
      }
      .report-meta {
        grid-template-columns: 1fr;
      }
      .confirmation-status {
        flex-direction: column;
        gap: 12px;
      }
      .action-buttons {
        justify-content: stretch;
      }
      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <nav class="page-nav">
    <a href="#" id="backLink">← Kembali</a>
  </nav>

  <div class="page-container">
    <div class="message" id="message"></div>

    <div class="report-detail-card" id="reportDetail">
      <!-- Report content will be populated by JavaScript -->
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initDatabase();
      const urlParams = new URLSearchParams(window.location.search);
      const reportId = parseInt(urlParams.get('id'));

      if (!reportId) {
        showMessage('ID laporan tidak valid', 'error');
        return;
      }

      renderReportDetail(reportId);
    });
  </script>
</body>
</html>
