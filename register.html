<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - Layanan Aduan</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== REGISTER PAGE STYLES ===== */
    .auth-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px 0;
      background: #0f1419;
      padding-top: 100px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: #1a1f2e;
      border-radius: 12px;
      border: 1px solid #333;
      padding: 50px 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .auth-card h2 {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 12px;
      text-align: center;
    }

    .auth-subtitle {
      text-align: center;
      color: #b0b0b0;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
    }

    .form-group input {
      padding: 14px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f1419;
      color: #ffffff;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2196F3;
      background: #151b28;
      box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
    }

    .form-group input::placeholder {
      color: #666;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-row .form-group {
      gap: 6px;
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 8px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: #2196F3;
    }

    .checkbox-group label {
      font-size: 13px;
      color: #b0b0b0;
      line-height: 1.4;
      cursor: pointer;
    }

    .checkbox-group a {
      color: #2196F3;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .checkbox-group a:hover {
      color: #1565C0;
      text-decoration: underline;
    }

    .password-strength {
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      width: 0%;
      background: #666;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .password-strength-bar.weak {
      width: 33%;
      background: #f44336;
    }

    .password-strength-bar.medium {
      width: 66%;
      background: #ff9800;
    }

    .password-strength-bar.strong {
      width: 100%;
      background: #4CAF50;
    }

    .btn-register {
      padding: 14px 16px;
      background: linear-gradient(135deg, #2196F3 0%, #1565C0 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 20px;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(33, 150, 243, 0.3);
    }

    .btn-register:active {
      transform: translateY(0);
    }

    .btn-register:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 30px 0;
      color: #666;
      font-size: 14px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #333;
    }

    .login-link {
      text-align: center;
      color: #b0b0b0;
      font-size: 14px;
    }

    .login-link a {
      color: #2196F3;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .login-link a:hover {
      color: #1565C0;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .auth-container {
        padding: 70px 15px 0;
        padding-top: 90px;
      }

      .auth-card {
        padding: 40px 20px;
      }

      .auth-card h2 {
        font-size: 28px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .form-group input {
        padding: 12px 14px;
        font-size: 14px;
      }

      .btn-register {
        padding: 12px 14px;
        font-size: 14px;
      }
    }

    /* ===== ERROR & SUCCESS MESSAGES ===== */
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.error {
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid #f44336;
      color: #ff9999;
    }

    .message.success {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid #4CAF50;
      color: #81c784;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="index.html">Layanan Aduan</a>
      </div>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="index.html#tentang" class="nav-link">Tentang</a></li>
        <li><a href="login.html" class="nav-link nav-btn">Masuk</a></li>
      </ul>
    </div>
  </nav>

  <!-- Register Container -->
  <div class="auth-container">
    <div class="auth-card">
      <h2>Daftar</h2>
      <p class="auth-subtitle">Buat akun baru untuk melaporkan aduan</p>

      <div class="message" id="message"></div>

      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="fullName">Nama Lengkap</label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName"
            placeholder="Masukkan nama lengkap" 
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="Masukkan email Anda" 
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="Minimal 8 karakter" 
            required
            oninput="checkPasswordStrength(this.value)"
          >
          <div class="password-strength">
            <div class="password-strength-bar" id="strengthBar"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Konfirmasi Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword"
            placeholder="Ulangi password" 
            required
          >
        </div>

        <div class="checkbox-group">
          <input 
            type="checkbox" 
            id="terms" 
            name="terms"
            required
          >
          <label for="terms">
            Saya setuju dengan <a href="#terms">Syarat & Ketentuan</a> dan <a href="#privacy">Kebijakan Privasi</a>
          </label>
        </div>

        <button type="submit" class="btn-register">Daftar Akun</button>
      </form>

      <div class="auth-divider">atau</div>

      <div class="login-link">
        Sudah punya akun? <a href="login.html">Masuk di sini</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    initDatabase();
    function checkPasswordStrength(password) {
      const strengthBar = document.getElementById('strengthBar');
      let strength = 0;

      if (password.length >= 8) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^a-zA-Z0-9]/.test(password)) strength++;

      strengthBar.className = 'password-strength-bar';
      if (strength <= 1) {
        strengthBar.classList.add('weak');
      } else if (strength <= 2) {
        strengthBar.classList.add('medium');
      } else {
        strengthBar.classList.add('strong');
      }
    }
  </script>
</body>
</html>
